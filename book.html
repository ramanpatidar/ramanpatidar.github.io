<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Service - Raman Patidar</title>
  <style>
    body {
      background: #0f172a;
      color: white;
      font-family: 'Poppins', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .form-container {
      background: #1e293b;
      padding: 30px;
      border-radius: 12px;
      width: 350px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.6);
    }
    h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #38bdf8;
    }
    label {
      font-weight: 500;
      display: block;
      margin-bottom: 6px;
    }
    input, textarea, select {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border: none;
      border-radius: 8px;
      outline: none;
    }
    button {
      width: 100%;
      padding: 12px;
      background: #38bdf8;
      color: black;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    button:hover {
      background: #0ea5e9;
      color: white;
    }
  </style>
</head>
<body>
  <div class="form-container">
    <h2>Book a Service</h2>
    <form action="https://formsubmit.co/ramanpatidar36@gmail.com" method="POST">
      <input type="hidden" name="_subject" value="New Service Booking Request">
      <label for="name">Full Name</label>
      <input type="text" name="name" id="name" required>

      <label for="contact">Contact No.</label>
      <input type="text" name="contact" id="contact" required>

      <label for="email">Email</label>
      <input type="email" name="email" id="email" required>

      <label for="whatsapp">WhatsApp</label>
      <input type="text" name="whatsapp" id="whatsapp">

      <label for="service">Service</label>
      <input type="text" name="service" id="service" value="" readonly>

      <label for="reason">Why do you need this service?</label>
      <textarea name="reason" id="reason" rows="4"></textarea>

      <button type="submit">Submit</button>
    </form>
  </div>

  <script>
    // Auto-fill service from URL query
    const urlParams = new URLSearchParams(window.location.search);
    const service = urlParams.get('service');
    if(service) {
      document.getElementById('service').value = service;
    }
  </script>
</body>
</html>
